# Nginx reverse proxy for V-Safe
#
# Install:
#   sudo cp deploy/nginx-v-safe.conf /etc/nginx/sites-available/v-safe
#   sudo ln -s /etc/nginx/sites-available/v-safe /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# For TLS, install certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.com

upstream vsafe_backend {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # --- Static React build (offloads FastAPI) ---
    root /opt/v-safe/backend/static/react;

    location /assets/ {
        alias /opt/v-safe/backend/static/react/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /captures/ {
        alias /opt/v-safe/backend/captures/;
        expires 1h;
    }

    # --- API routes → Uvicorn ---
    location /api/ {
        proxy_pass http://vsafe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # --- WebSocket routes → Uvicorn ---
    location /ws/ {
        proxy_pass http://vsafe_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- MJPEG video feed → Uvicorn ---
    location /video/ {
        proxy_pass http://vsafe_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    # --- SPA fallback (serve index.html for all other routes) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
